<header class="site-navbar">
    <div class="site-navbar__inner">
        <a href="#" class="site-navbar__brand" aria-label="Furniro Home">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="30" height="30" rx="4" fill="#B88E2F"/>
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="20" font-weight="bold">F</text>
            </svg>
            <span>Furniro</span>
        </a>

        <nav class="site-navbar__menu" aria-label="Primary navigation">
            <a href="#home" class="site-navbar__link" data-nav="home">Home</a>
            <a href="#shop" class="site-navbar__link" data-nav="shop">Shop</a>
            <a href="#about" class="site-navbar__link" data-nav="about">About</a>
            <a href="#contact" class="site-navbar__link" data-nav="contact">Contact</a>
        </nav>

        <div class="site-navbar__actions">
            <div class="site-navbar__search-wrapper">
                <input type="text" class="site-navbar__search-input" placeholder="Search products..." id="navbar-search">
                <button class="site-navbar__search-btn" aria-label="Search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
            <div class="site-navbar__account-menu">
                <button class="site-navbar__icon site-navbar__account-btn" aria-label="Account" aria-expanded="false">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </button>
                <div class="site-navbar__account-dropdown">
                    <div class="account-dropdown__user-info">
                        <p class="account-dropdown__user-name">Guest User</p>
                        <p class="account-dropdown__user-email">Not logged in</p>
                    </div>
                    <div class="account-dropdown__divider"></div>
                    <a href="#account" class="account-dropdown__item account-dropdown__account" aria-label="View Account">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>My Account</span>
                    </a>
                    <button class="account-dropdown__item account-dropdown__logout" aria-label="Logout">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
            <a href="#wishlist" class="site-navbar__icon" aria-label="Wishlist" data-nav="wishlist">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            </a>
            <a href="#cart" class="site-navbar__icon cart-icon" aria-label="Cart" data-nav="cart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-badge" id="cart-count">0</span>
            </a>
        </div>

        <button class="site-navbar__mobile-toggle" aria-label="Toggle menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>

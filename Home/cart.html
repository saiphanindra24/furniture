<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...Cart...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
/>
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="../assets/components/navbar.css">
<link rel="stylesheet" href="../assets/components/footer.css">

</head>

<body>

    <div>
       <div id="navbar"></div>
        <main>
            <section class="cart-hero">
                <div class="cart-hero-content">
                    <div class="cart-hero-logo"><img src="Images/Logo.png" alt="Furniro"></div>
                    <h1>Cart</h1>
                    <p class="cart-breadcrumb"><a href="Home.html">Home</a> <span>&gt;</span> Cart</p>
                </div>
            </section>

            <section class="cart-layout">
                <div class="cart-table-wrapper">
                    <div class="cart-table-heading">
                        <span>Product</span>
                        <span>Price</span>
                        <span>Quantity</span>
                        <span>Subtotal</span>
                    </div>

                    <div class="cart-item">
                        <div class="cart-item-product">
                            <div class="cart-item-thumb">
                                <img src="Images/Sofa.png" alt="Asgaard sofa">
                            </div>
                            <div class="cart-item-info">
                                <p class="product-name">Asgaard sofa</p>
                            </div>
                        </div>
                        <div class="cart-item-price">Rs. 250,000.00</div>
                        <div class="cart-item-quantity"><input type="number" value="1" min="1"></div>
                        <div class="cart-item-subtotal">Rs. 250,000.00</div>
                        <div class="cart-item-remove"><button type="button" aria-label="Remove item">🗑</button></div>
                    </div>
                </div>

                <aside class="cart-totals">
                    <h2>Cart Totals</h2>
                    <div class="cart-totals-row">
                        <span>Subtotal</span>
                        <span>Rs. 250,000.00</span>
                    </div>
                    <div class="cart-totals-row total">
                        <span>Total</span>
                        <span>Rs. 250,000.00</span>
                    </div>
                    <button class="checkout-button">Check Out</button>
                </aside>
            </section>
            <section class="support-section">
                <div class="support">
                    <div class="support-item">
                        <div class="support-icon">
                            <img src="Images/trophy 1.png" alt="trophy">
                        </div>
                        <div class="support-info">
                            <h4 class="support-title">High Quality</h4>
                            <p class="support-desc">crafted from top materials</p>
                        </div>
                    </div>

                    <div class="support-item">
                        <div class="support-icon">
                            <img src="Images/guarantee.png" alt="">
                        </div>
                        <div class="support-info">
                            <h4 class="support-title">Warranty Protection</h4>
                            <p class="support-desc">Over 2 years</p>
                        </div>
                    </div>

                    <div class="support-item">
                        <div class="support-icon">
                            <img src="Images/shipping.png" alt="">
                        </div>
                        <div class="support-info">
                            <h4 class="support-title">Free Shipping</h4>
                            <p class="support-desc">Order over 150 $</p>
                        </div>
                    </div>

                    <div class="support-item">
                        <div class="support-icon">
                            <img src="Images/customer-support.png" alt="">
                        </div>
                        <div class="support-info">
                            <h4 class="support-title">24 / 7 Support</h4>
                            <p class="support-desc">Dedicated support</p>
                        </div>
                    </div>
                </div>


            </section>
        </main>

    </div>
    <div id="footer"></div>

<script src="../assets/components/layout.js"></script>
<script src="../assets/components/cart-count.js"></script>
    <script src="cart.js"></script>
</body>

</html>

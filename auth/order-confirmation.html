<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order Confirmation - Furniro</title>
<link rel="stylesheet" href="order-confirmation.css">
<link href="../assets/components/navbar.css" rel="stylesheet">

</head>
<body>

  <main class="confirmation-main">

      <div id="order-details" class="order-details">

      <div class="confirmation-actions">
        <a href="../auth/orders.html" class="btn btn-primary">View My Orders</a>
        <a href="../Home/Home.html" class="btn btn-secondary">Continue Shopping</a>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="../assets/components/layout.js"></script>
  <script src="auth.js"></script>
  <script src="order-confirmation.js"></script>

</html>

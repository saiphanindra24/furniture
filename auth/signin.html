<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Sign In</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <!-- Shared CSS -->

    <link
        rel="stylesheet"
        href="../assets/components/navbar.css"
    >

    <link
        rel="stylesheet"
        href="../assets/components/footer.css"
    >

    <!-- Signin CSS -->

    <link
        rel="stylesheet"
        href="signin.css"
    >

</head>

<body>

    <!-- NAVBAR -->

    <div id="navbar"></div>

    <!-- AUTH SECTION -->

    <section class="auth-section">

        <div class="auth-container">

            <!-- LEFT IMAGE -->

            <div class="auth-image">

                <div class="overlay"></div>

                <div class="auth-image-content">

                    <h1>
                        Welcome Back
                    </h1>

                    <p>
                        Login to continue shopping with Furniro
                    </p>

                </div>

            </div>

            <!-- RIGHT BOX -->

            <div class="auth-box">

                <h2>Sign In</h2>

                <p class="subtitle">
                    Login to your account
                </p>

                <!-- FORM -->

                <form id="signin-form">

                    <input
                        type="email"
                        id="signin-email"
                        placeholder="Email Address"
                        required
                    >

                    <input
                        type="password"
                        id="signin-password"
                        placeholder="Password"
                        required
                    >

                    <div class="forgot-password">
                        Forgot Password?
                    </div>

                    <button type="submit" class="auth-btn">
                        Sign In
                    </button>

                </form>

                <!-- SOCIAL LOGIN -->

                <div class="social-login">

                    <button class="social-btn google-btn">

                        <i class="fa-brands fa-google"></i>

                        Google

                    </button>

                    <button class="social-btn github-btn">

                        <i class="fa-brands fa-github"></i>

                        GitHub

                    </button>

                    <button class="social-btn linkedin-btn">

                        <i class="fa-brands fa-linkedin"></i>

                        LinkedIn

                    </button>

                </div>

                <!-- TOGGLE -->

                <p class="toggle-text">

                    Don’t have an account?

                    <a href="signup.html">
                        Sign Up
                    </a>

                </p>

            </div>

        </div>

    </section>

    <!-- FOOTER -->

    <div id="footer"></div>

    <!-- SHARED JS -->

    <script src="../assets/components/layout.js"></script>

    <!-- AUTH HELPERS -->

    <script src="auth.js"></script>

    <!-- SIGNIN JS -->

    <script src="signin.js"></script>

</body>

</html>

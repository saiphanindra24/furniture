<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cart.css" />
    <link rel="stylesheet" href="../assets/navbar.css" />
    <title>Document</title>
</head>

<body>
    <header class="site-navbar">
        <div class="site-navbar__inner">
            <a href="../Home/Home.html" class="site-navbar__brand">
                <img src="../assets/logo.png" alt="Furniro logo">
                <span>Furniro</span>
            </a>
            <nav class="site-navbar__menu" aria-label="Primary navigation">
                <a href="../Home/Home.html" class="site-navbar__link">Home</a>
                <a href="../Shop/index.html" class="site-navbar__link active">Shop</a>
                <a href="../blog/blog.html" class="site-navbar__link">About</a>
                <a href="../checkout/contact.html" class="site-navbar__link">Contact</a>
            </nav>
            <div class="site-navbar__actions">
                <a href="../Home/Home.html" class="site-navbar__icon" aria-label="Account">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                    </svg>
                </a>
                <a href="../Shop/index.html" class="site-navbar__icon" aria-label="Search">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="7" />
                        <line x1="16.5" y1="16.5" x2="22" y2="22" />
                    </svg>
                </a>
                <a href="../Wishlist/Wishlist.html" class="site-navbar__icon" aria-label="Wishlist">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                </a>
                <a href="../Home/cart.html" class="site-navbar__icon" aria-label="Cart">
                    <svg viewBox="0 0 24 24">
                        <circle cx="9" cy="21" r="1" />
                        <circle cx="20" cy="21" r="1" />
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                    </svg>
                </a>
            </div>
        </div>
    </header>
    <div class="cart-sidebar open" id="cart-sidebar">
        <div class="cart-header">
            <h3>Shopping Cart</h3>
            <i id="close-cart-btn" class="fa-solid fa-xmark" style="color: #aaa; cursor: pointer;"
                title="Close Cart"></i>
        </div>
        <div class="cart-items">
            <div class="cart-item">
                <img src="assets/images/sofa1.png" alt="Asgaard sofa" />
                <div class="cart-item-info">
                    <p class="item-name">Asgaard sofa</p>
                    <p class="item-qty">1 x <span class="price-gold">Rs. 250,000.00</span></p>
                </div>
                <i class="fa-solid fa-circle-xmark"></i>
            </div>
            <div class="cart-item">
                <img src="assets/images/sofa2.png" alt="Casaliving Wood" />
                <div class="cart-item-info">
                    <p class="item-name">Casaliving Wood</p>
                    <p class="item-qty">1 x <span class="price-gold">Rs. 270,000.00</span></p>
                </div>
                <i class="fa-solid fa-circle-xmark"></i>
            </div>
        </div>

        <div style="flex-grow: 1;"></div>

        <div class="cart-footer">
            <div class="cart-subtotal">
                <span>Subtotal</span>
                <span class="subtotal-amt">Rs. 520,000.00</span>
            </div>
            <hr class="divider" style="margin: 20px 0;" />
            <div class="cart-actions">
                <button class="btn-cart-action">Cart</button>
<a href="../checkout/chekout.html" class="btn-cart-action">Checkout</a>
                <button class="btn-cart-action">Comparison</button>
            </div>
        </div>
    </div>

    <script src="cart.js"></script>
</body>

</html>
